          format: binary
          x-oaiTypeLabel: file
          description: |
            The sample audio recording file. Maximum size is 10 MiB.

            Supported MIME types:
            `audio/mpeg`, `audio/wav`, `audio/x-wav`, `audio/ogg`, `audio/aac`, `audio/flac`, `audio/webm`, `audio/mp4`.
        consent:
          type: string
          description: The consent recording ID (for example, `cons_1234`).
      required:
        - name
        - audio_sample
        - consent
    MCPTool:
      type: object
      title: MCP tool
      description: |
        Give the model access to additional tools via remote Model Context Protocol
        (MCP) servers. [Learn more about MCP](/docs/guides/tools-remote-mcp).
      properties:
        type:
          type: string
          enum:
            - mcp
          description: The type of the MCP tool. Always `mcp`.
          x-stainless-const: true
        server_label:
          type: string
          description: |
            A label for this MCP server, used to identify it in tool calls.
        server_url:
          type: string
          description: |
            The URL for the MCP server. One of `server_url` or `connector_id` must be
            provided.
        connector_id:
          type: string
          enum:
            - connector_dropbox
            - connector_gmail
            - connector_googlecalendar
            - connector_googledrive
            - connector_microsoftteams
            - connector_outlookcalendar
            - connector_outlookemail
            - connector_sharepoint
          description: |
            Identifier for service connectors, like those available in ChatGPT. One of
            `server_url` or `connector_id` must be provided. Learn more about service
            connectors [here](/docs/guides/tools-remote-mcp#connectors).

            Currently supported `connector_id` values are:

            - Dropbox: `connector_dropbox`
            - Gmail: `connector_gmail`
            - Google Calendar: `connector_googlecalendar`
            - Google Drive: `connector_googledrive`
            - Microsoft Teams: `connector_microsoftteams`
            - Outlook Calendar: `connector_outlookcalendar`
            - Outlook Email: `connector_outlookemail`
            - SharePoint: `connector_sharepoint`
        authorization:
          type: string
          description: |
            An OAuth access token that can be used with a remote MCP server, either
            with a custom MCP server URL or a service connector. Your application
            must handle the OAuth authorization flow and provide the token here.
        server_description:
          type: string
          description: |
            Optional description of the MCP server, used to provide more context.
        headers:
          anyOf:
            - type: object
              additionalProperties:
                type: string
              description: |
                Optional HTTP headers to send to the MCP server. Use for authentication
                or other purposes.
            - type: 'null'
        allowed_tools:
          anyOf:
            - description: |
                List of allowed tool names or a filter object.
              oneOf:
                - type: array
                  title: MCP allowed tools
                  description: A string array of allowed tool names
                  items:
                    type: string
                - $ref: '#/components/schemas/MCPToolFilter'
            - type: 'null'
        require_approval:
          anyOf:
            - description: Specify which of the MCP server's tools require approval.
              oneOf:
                - type: object
                  title: MCP tool approval filter
                  description: |
                    Specify which of the MCP server's tools require approval. Can be
                    `always`, `never`, or a filter object associated with tools
                    that require approval.
                  properties:
                    always:
                      $ref: '#/components/schemas/MCPToolFilter'
                    never:
                      $ref: '#/components/schemas/MCPToolFilter'
                  additionalProperties: false
                - type: string
                  title: MCP tool approval setting
                  description: |
                    Specify a single approval policy for all tools. One of `always` or
                    `never`. When set to `always`, all tools will require approval. When
                    set to `never`, all tools will not require approval.
                  enum:
                    - always
                    - never
              default: always
            - type: 'null'
        defer_loading:
          type: boolean
          description: |
            Whether this MCP tool is deferred and discovered via tool search.
      required:
        - type
        - server_label
    MCPToolFilter:
      type: object
      title: MCP tool filter
      description: |
        A filter object to specify which tools are allowed.
      properties:
        tool_names:
          type: array
          title: MCP allowed tools
          items:
            type: string
          description: List of allowed tool names.
        read_only:
          type: boolean
          description: |
            Indicates whether or not a tool modifies data or is read-only. If an
            MCP server is [annotated with `readOnlyHint`](https://modelcontextprotocol.io/specification/2025-06-18/schema#toolannotations-readonlyhint),
            it will match this filter.
      required: []
      additionalProperties: false
    NoiseReductionType:
      type: string
      enum:
        - near_field
        - far_field
      description: |
        Type of noise reduction. `near_field` is for close-talking microphones such as headphones, `far_field` is for far-field microphones such as laptop or conference room microphones.
    Prompt:
      anyOf:
        - type: object
          description: |
            Reference to a prompt template and its variables.
            [Learn more](/docs/guides/text?api-mode=responses#reusable-prompts).
          required:
            - id
          properties:
            id:
              type: string
              description: The unique identifier of the prompt template to use.
            version:
              anyOf:
                - type: string
                  description: Optional version of the prompt template.
                - type: 'null'
            variables:
              $ref: '#/components/schemas/ResponsePromptVariables'
        - type: 'null'
    RealtimeAudioFormats:
      anyOf:
        - type: object
          title: PCM audio format
          description: The PCM audio format. Only a 24kHz sample rate is supported.
          properties:
            type:
              type: string
              description: The audio format. Always `audio/pcm`.
              enum:
                - audio/pcm
            rate:
              type: integer
              description: The sample rate of the audio. Always `24000`.
              enum:
                - 24000
        - type: object
          title: PCMU audio format
          description: The G.711 μ-law format.
          properties:
            type:
              type: string
              description: The audio format. Always `audio/pcmu`.
              enum:
                - audio/pcmu
        - type: object
          title: PCMA audio format
          description: The G.711 A-law format.
          properties:
            type:
              type: string
              description: The audio format. Always `audio/pcma`.
              enum:
                - audio/pcma
    RealtimeCreateClientSecretRequest:
      type: object
      title: Realtime client secret creation request
      description: |
        Create a session and client secret for the Realtime API. The request can specify
        either a realtime or a transcription session configuration.
        [Learn more about the Realtime API](/docs/guides/realtime).
      properties:
        expires_after:
          type: object
          title: Client secret expiration
          description: |
            Configuration for the client secret expiration. Expiration refers to the time after which
            a client secret will no longer be valid for creating sessions. The session itself may
            continue after that time once started. A secret can be used to create multiple sessions
            until it expires.
          properties:
            anchor:
              type: string
              enum:
                - created_at
              description: |
                The anchor point for the client secret expiration, meaning that `seconds` will be added to the `created_at` time of the client secret to produce an expiration timestamp. Only `created_at` is currently supported.
              default: created_at
              x-stainless-const: true
            seconds:
              type: integer
              description: |
                The number of seconds from the anchor point to the expiration. Select a value between `10` and `7200` (2 hours). This default to 600 seconds (10 minutes) if not specified.
              minimum: 10
              maximum: 7200
              default: 600
        session:
          title: Session configuration
          description: |
            Session configuration to use for the client secret. Choose either a realtime
            session or a transcription session.
          oneOf:
            - $ref: '#/components/schemas/RealtimeSessionCreateRequestGA'
            - $ref: '#/components/schemas/RealtimeTranscriptionSessionCreateRequestGA'
    RealtimeCreateClientSecretResponse:
      type: object
      title: Realtime session and client secret
      description: |
        Response from creating a session and client secret for the Realtime API.
      properties:
        value:
          type: string
          description: The generated client secret value.
        expires_at:
          type: integer
          description: Expiration timestamp for the client secret, in seconds since epoch.
        session:
          title: Session configuration
          description: |
            The session configuration for either a realtime or transcription session.
          oneOf:
            - $ref: '#/components/schemas/RealtimeSessionCreateResponseGA'
            - $ref: '#/components/schemas/RealtimeTranscriptionSessionCreateResponseGA'
          discriminator:
            propertyName: type
      required:
        - value
        - expires_at
        - session
      x-oaiMeta:
        name: Session response object
        group: realtime
        example: |
          {
            "value": "ek_68af296e8e408191a1120ab6383263c2",
            "expires_at": 1756310470,
            "session": {
              "type": "realtime",
              "object": "realtime.session",
              "id": "sess_C9CiUVUzUzYIssh3ELY1d",
              "model": "gpt-realtime-2025-08-25",
              "output_modalities": [
                "audio"
              ],
              "instructions": "You are a friendly assistant.",
              "tools": [],
              "tool_choice": "auto",
              "max_output_tokens": "inf",
              "tracing": null,
              "truncation": "auto",
              "prompt": null,
              "expires_at": 0,
              "audio": {
                "input": {
                  "format": {
                    "type": "audio/pcm",
                    "rate": 24000
                  },
                  "transcription": null,
                  "noise_reduction": null,
                  "turn_detection": {
                    "type": "server_vad",
                    "threshold": 0.5,
                    "prefix_padding_ms": 300,
                    "silence_duration_ms": 200,
                    "idle_timeout_ms": null,
                    "create_response": true,
                    "interrupt_response": true
                  }
                },
                "output": {
                  "format": {
                    "type": "audio/pcm",
                    "rate": 24000
                  },
                  "voice": "alloy",
                  "speed": 1.0
                }
              },
              "include": null
            }
          }
    RealtimeFunctionTool:
      type: object
      title: Function tool
      properties:
        type:
          type: string
          enum:
            - function
          description: The type of the tool, i.e. `function`.
          x-stainless-const: true
        name:
          type: string
          description: The name of the function.
        description:
          type: string
          description: |
            The description of the function, including guidance on when and how
            to call it, and guidance about what to tell the user when calling
            (if anything).
        parameters:
          type: object
          description: Parameters of the function in JSON Schema.
    RealtimeSessionCreateRequest:
      type: object
      description: |
        A new Realtime session configuration, with an ephemeral key. Default TTL
        for keys is one minute.
      properties:
        client_secret:
          type: object
          description: Ephemeral key returned by the API.
          properties:
            value:
              type: string
              description: |
                Ephemeral key usable in client environments to authenticate connections
                to the Realtime API. Use this in client-side environments rather than
                a standard API token, which should only be used server-side.
            expires_at:
              type: integer
              description: |
                Timestamp for when the token expires. Currently, all tokens expire
                after one minute.
          required:
            - value
            - expires_at
        modalities:
          description: |
            The set of modalities the model can respond with. To disable audio,
            set this to ["text"].
          items:
            type: string
            enum:
              - text
              - audio
        instructions:
          type: string
          description: |
            The default system instructions (i.e. system message) prepended to model calls. This field allows the client to guide the model on desired responses. The model can be instructed on response content and format, (e.g. "be extremely succinct", "act friendly", "here are examples of good responses") and on audio behavior (e.g. "talk quickly", "inject emotion into your voice", "laugh frequently"). The instructions are not guaranteed to be followed by the model, but they provide guidance to the model on the desired behavior.
            Note that the server sets default instructions which will be used if this field is not set and are visible in the `session.created` event at the start of the session.
        voice:
          $ref: '#/components/schemas/VoiceIdsOrCustomVoice'
          description: |
            The voice the model uses to respond. Supported built-in voices are
            `alloy`, `ash`, `ballad`, `coral`, `echo`, `sage`, `shimmer`, `verse`,
            `marin`, and `cedar`. You may also provide a custom voice object with an
            `id`, for example `{ "id": "voice_1234" }`. Voice cannot be changed during
            the session once the model has responded with audio at least once.
        input_audio_format:
          type: string
          description: |
            The format of input audio. Options are `pcm16`, `g711_ulaw`, or `g711_alaw`.
        output_audio_format:
          type: string
          description: |
            The format of output audio. Options are `pcm16`, `g711_ulaw`, or `g711_alaw`.
        input_audio_transcription:
          type: object
          description: |
            Configuration for input audio transcription, defaults to off and can be
            set to `null` to turn off once on. Input audio transcription is not native
            to the model, since the model consumes audio directly. Transcription runs
            asynchronously and should be treated as rough guidance
            rather than the representation understood by the model.
          properties:
            model:
              type: string
              description: |
                The model to use for transcription.
        speed:
          type: number
          default: 1
          maximum: 1.5
          minimum: 0.25
          description: |
            The speed of the model's spoken response. 1.0 is the default speed. 0.25 is
            the minimum speed. 1.5 is the maximum speed. This value can only be changed
            in between model turns, not while a response is in progress.
        tracing:
          title: Tracing Configuration
          description: |
            Configuration options for tracing. Set to null to disable tracing. Once
            tracing is enabled for a session, the configuration cannot be modified.

            `auto` will create a trace for the session with default values for the
            workflow name, group id, and metadata.
          oneOf:
            - type: string
              default: auto
              description: |
                Default tracing mode for the session.
              enum:
                - auto
              x-stainless-const: true
            - type: object
              title: Tracing Configuration
              description: |
                Granular configuration for tracing.
              properties:
                workflow_name:
                  type: string
                  description: |
                    The name of the workflow to attach to this trace. This is used to
                    name the trace in the traces dashboard.
                group_id:
                  type: string
                  description: |
                    The group id to attach to this trace to enable filtering and
                    grouping in the traces dashboard.
                metadata:
                  type: object
                  description: |
                    The arbitrary metadata to attach to this trace to enable
                    filtering in the traces dashboard.
        turn_detection:
          type: object
          description: |
            Configuration for turn detection. Can be set to `null` to turn off. Server
            VAD means that the model will detect the start and end of speech based on
            audio volume and respond at the end of user speech.
          properties:
            type:
              type: string
              description: |
                Type of turn detection, only `server_vad` is currently supported.
            threshold:
              type: number
              description: |
                Activation threshold for VAD (0.0 to 1.0), this defaults to 0.5. A
                higher threshold will require louder audio to activate the model, and
                thus might perform better in noisy environments.
            prefix_padding_ms:
              type: integer
              description: |
                Amount of audio to include before the VAD detected speech (in
                milliseconds). Defaults to 300ms.
            silence_duration_ms:
              type: integer
              description: |
                Duration of silence to detect speech stop (in milliseconds). Defaults
                to 500ms. With shorter values the model will respond more quickly,
                but may jump in on short pauses from the user.
        tools:
          type: array
          description: Tools (functions) available to the model.
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - function
                description: The type of the tool, i.e. `function`.
                x-stainless-const: true
              name:
                type: string
                description: The name of the function.
              description:
                type: string
                description: |
                  The description of the function, including guidance on when and how
                  to call it, and guidance about what to tell the user when calling
                  (if anything).
              parameters:
                type: object
                description: Parameters of the function in JSON Schema.
        tool_choice:
          type: string
          description: |
            How the model chooses tools. Options are `auto`, `none`, `required`, or
            specify a function.
        temperature:
          type: number
          description: |
            Sampling temperature for the model, limited to [0.6, 1.2]. Defaults to 0.8.
        max_response_output_tokens:
          oneOf:
            - type: integer
            - type: string
              enum:
                - inf
              x-stainless-const: true
          description: |
            Maximum number of output tokens for a single assistant response,
            inclusive of tool calls. Provide an integer between 1 and 4096 to
            limit output tokens, or `inf` for the maximum available tokens for a
            given model. Defaults to `inf`.
        truncation:
          $ref: '#/components/schemas/RealtimeTruncation'
        prompt:
          $ref: '#/components/schemas/Prompt'
      required:
        - client_secret
      x-oaiMeta:
        name: The session object
        group: realtime
        example: |
          {
            "id": "sess_001",
            "object": "realtime.session",
            "model": "gpt-realtime-2025-08-25",
            "modalities": ["audio", "text"],
            "instructions": "You are a friendly assistant.",
            "voice": "alloy",
            "input_audio_format": "pcm16",
            "output_audio_format": "pcm16",
