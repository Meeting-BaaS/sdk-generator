          type: integer
          default: 300
          description: |
            Amount of audio to include before the VAD detected speech (in 
            milliseconds).
        silence_duration_ms:
          type: integer
          default: 200
          description: |
            Duration of silence to detect speech stop (in milliseconds).
            With shorter values the model will respond more quickly, 
            but may jump in on short pauses from the user.
        threshold:
          type: number
          default: 0.5
          description: |
            Sensitivity threshold (0.0 to 1.0) for voice activity detection. A 
            higher threshold will require louder audio to activate the model, and 
            thus might perform better in noisy environments.
    VoiceIdsOrCustomVoice:
      title: Voice
      description: |
        A built-in voice name or a custom voice reference.
      anyOf:
        - $ref: '#/components/schemas/VoiceIdsShared'
        - type: object
          description: Custom voice reference.
          additionalProperties: false
          required:
            - id
          properties:
            id:
              type: string
              description: The custom voice ID, e.g. `voice_1234`.
              example: voice_1234
    VoiceIdsShared:
      example: ash
      anyOf:
        - type: string
        - type: string
          enum:
            - alloy
            - ash
            - ballad
            - coral
            - echo
            - sage
            - shimmer
            - verse
            - marin
            - cedar
    VoiceResource:
      type: object
      title: Voice
      description: A custom voice that can be used for audio output.
      additionalProperties: false
      properties:
        object:
          type: string
          description: The object type, which is always `audio.voice`.
          enum:
            - audio.voice
          x-stainless-const: true
        id:
          type: string
          description: The voice identifier, which can be referenced in API endpoints.
        name:
          type: string
          description: The name of the voice.
        created_at:
          type: integer
          description: The Unix timestamp (in seconds) for when the voice was created.
      required:
        - object
        - id
        - name
        - created_at
      x-oaiMeta:
        name: The voice object
        example: |
          {
            "object": "audio.voice",
            "id": "voice_123abc",
            "name": "My new voice",
            "created_at": 1734220800
          }
    InputTextContent:
      properties:
        type:
          type: string
          enum:
            - input_text
          description: The type of the input item. Always `input_text`.
          default: input_text
          x-stainless-const: true
        text:
          type: string
          description: The text input to the model.
      type: object
      required:
        - type
        - text
      title: Input text
      description: A text input to the model.
    ImageDetail:
      type: string
      enum:
        - low
        - high
        - auto
        - original
    InputImageContent:
      properties:
        type:
          type: string
          enum:
            - input_image
          description: The type of the input item. Always `input_image`.
          default: input_image
          x-stainless-const: true
        image_url:
          anyOf:
            - type: string
              description: The URL of the image to be sent to the model. A fully qualified URL or base64 encoded image in a data URL.
            - type: 'null'
        file_id:
          anyOf:
            - type: string
              description: The ID of the file to be sent to the model.
            - type: 'null'
        detail:
          $ref: '#/components/schemas/ImageDetail'
          description: The detail level of the image to be sent to the model. One of `high`, `low`, `auto`, or `original`. Defaults to `auto`.
      type: object
      required:
        - type
        - detail
      title: Input image
      description: An image input to the model. Learn about [image inputs](/docs/guides/vision).
    FileInputDetail:
      type: string
      enum:
        - low
        - high
    InputFileContent:
      properties:
        type:
          type: string
          enum:
            - input_file
          description: The type of the input item. Always `input_file`.
          default: input_file
          x-stainless-const: true
        file_id:
          anyOf:
            - type: string
              description: The ID of the file to be sent to the model.
            - type: 'null'
        filename:
          type: string
          description: The name of the file to be sent to the model.
        file_data:
          type: string
          description: |
            The content of the file to be sent to the model.
        file_url:
          type: string
          description: The URL of the file to be sent to the model.
        detail:
          $ref: '#/components/schemas/FileInputDetail'
          description: The detail level of the file to be sent to the model. Use `low` for the default rendering behavior, or `high` to render the file at higher quality. Defaults to `low`.
