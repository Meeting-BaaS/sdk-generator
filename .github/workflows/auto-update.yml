name: Auto Update SDK

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: auto-update-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
      changed_providers: ${{ steps.sync-specs.outputs.changed_providers }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for version comparison

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # Step 1: Sync specs and check checksums (fast — HTTP fetches only)
      - name: Sync specs and check for upstream changes
        id: sync-specs
        run: |
          echo "Syncing OpenAPI specs from official sources..."
          pnpm openapi:sync
          echo ""

          # Check if any spec files changed after sync (including checksums)
          SPEC_CHANGES="$(git diff --name-only -- specs/ || true)"
          SPEC_NEW="$(git ls-files --others --exclude-standard -- specs/ || true)"
          ALL_SPEC_CHANGES="$(echo -e "${SPEC_CHANGES}\n${SPEC_NEW}" | grep -v '.checksums.json' | sed '/^$/d' | sort -u)"

          if [ -z "$ALL_SPEC_CHANGES" ]; then
            echo "No upstream spec changes detected"
            echo "has_spec_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Spec changes detected:"
            echo "$ALL_SPEC_CHANGES"
            echo "has_spec_changes=true" >> $GITHUB_OUTPUT

            # Extract changed provider names for commit message
            CHANGED_PROVIDERS="$(echo "$ALL_SPEC_CHANGES" | sed 's|specs/||;s|-.*||' | sort -u | tr '\n' ', ' | sed 's/,$//')"
            echo "changed_providers=$CHANGED_PROVIDERS" >> $GITHUB_OUTPUT
          fi

      # Step 2: Full SDK regeneration (expensive — only runs if specs changed)
      - name: Regenerate SDK
        if: steps.sync-specs.outputs.has_spec_changes == 'true'
        run: |
          echo "Specs changed — running full SDK regeneration..."
          pnpm openapi:generate && pnpm build
          echo "SDK regenerated successfully"

      - name: Check for actual changes
        id: check-changes
        run: |
          echo "Checking for actual file changes..."

          # Get all changed & untracked files
          #   • modified / deleted:   git diff --name-only
          #   • added      :         git ls-files --others --exclude-standard
          CHANGED_FILES="$(
            {
              git diff --name-only
              git ls-files --others --exclude-standard
            } | sort -u
          )"

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected in generated files"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Filter out webhook documentation and checksum-only changes
          FILTERED_CHANGES=$(echo "$CHANGED_FILES" | grep -v "src/generated/v1/api/webhooks/" | grep -v "specs/.checksums.json" || true)

          if [ -z "$FILTERED_CHANGES" ]; then
            echo "Only webhook documentation or checksum changes detected - ignoring"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "API schema changes detected:"
            echo "$FILTERED_CHANGES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  test:
    if: needs.check-and-update.outputs.has_changes == 'true'
    uses: ./.github/workflows/test-sdk.yml
    needs: check-and-update
    with:
      node-versions: '[18, 19, 20, 21, 22]'
      upload-coverage: 'false'

  bump-version-and-publish:
    if: needs.check-and-update.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    needs: [check-and-update, test]
    outputs:
      new_version: ${{ steps.bump-version.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump patch version
        id: bump-version
        run: |
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Bump patch version
          NEW_VERSION=$(pnpm version patch --no-git-tag-version)
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # 🔨 Re-build artefacts *after* bumping the version with new open api spec
      - name: Build SDK
        run: pnpm openapi:rebuild

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "chore: auto-update SDK to ${{ steps.bump-version.outputs.new_version }} [skip ci]

          Changed providers: ${{ needs.check-and-update.outputs.changed_providers || 'unknown' }}"
          git push origin main

      - name: Publish to npm
        run: pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    if: needs.check-and-update.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    needs: [check-and-update, bump-version-and-publish]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version-and-publish.outputs.new_version }}
          name: Release ${{ needs.bump-version-and-publish.outputs.new_version }}
          body: |
            🤖 Auto-generated release

            This release was automatically generated due to changes in the Meeting BaaS API specification.

            ## Changes
            - Updated SDK to match latest API specification
            - All tests passing across Node.js versions 18, 19, 20, 21, and 22

            ## Testing
            - ✅ Node.js 18
            - ✅ Node.js 19
            - ✅ Node.js 20
            - ✅ Node.js 21
            - ✅ Node.js 22
          draft: false
          prerelease: false
